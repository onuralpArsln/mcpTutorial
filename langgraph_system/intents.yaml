# langgraph_system/intents.yaml
# ==========================================================================
# SINGLE SOURCE OF TRUTH for all intents and their associated tools.
#
# HOW TO ADD A NEW MCP:
#   1. Start your new MCP server.
#   2. Find the tool names it exposes.
#   3. Add those tool names under the relevant intent's 'tools' list below.
#   4. That's it. No Python code changes needed.
#
# HOW TO ADD A NEW INTENT:
#   1. Add a new top-level entry under 'intents'.
#   2. Fill in description, examples, and tools.
#   3. The system will automatically pick it up on next run.
# ==========================================================================

intents:

  analyze:
    description: "Performansı göster, rapor ver, KPI sorgula, satış/reklam analizi yap"
    examples:
      - "roas nedir"
      - "performans raporunu göster"
      - "geçen hafta satışlar nasıldı"
      - "kampanya metrikleri nelerdir"
    tools:
      - get_performance_metrics      # source: mcp_server.py (analytics)
      - get_strategy_rules           # source: mcp_server.py (analytics)
      - run_pattern_recognition      # source: mcp_server.py (analytics)
      # future: - get_db_analytics   # source: database_mcp_server.py

  info_only:
    description: "Ürün listesi, maliyet bilgisi, genel sistem soruları"
    examples:
      - "hangi ürünler var"
      - "ürün listesini göster"
      - "P001 maliyeti nedir"
      - "sistem bilgisi ver"
    tools:
      - list_products                # source: mcp_server.py
      - get_product_costs            # source: mcp_server.py
      - system_info                  # source: mcp_server.py
      - notlari_listele              # source: mcp_server.py
      # future: - search_product_db  # source: database_mcp_server.py

  scale_up:
    description: "Bütçeyi artır, kampanyayı büyüt, harcamayı yükselt"
    examples:
      - "kampanya bütçesini artır"
      - "scale up yap"
      - "daha fazla harca"
    tools:
      - get_performance_metrics      # source: mcp_server.py
      - get_strategy_rules           # source: mcp_server.py

  optimize:
    description: "Düşük performans düzelt, bid azalt, verimsizlik gider"
    examples:
      - "verimsiz kampanyaları düzelt"
      - "optimize et"
      - "performansı iyileştir"
    tools:
      - get_performance_metrics      # source: mcp_server.py
      - get_strategy_rules           # source: mcp_server.py
      - run_pattern_recognition      # source: mcp_server.py

  file_ops:
    description: "Dosya oluştur, yaz, oku ile ilgili işlemler"
    examples:
      - "bir dosya oluştur"
      - "notlarımı kaydet"
      - "dosyayı yaz"
    tools:
      - dosya_yaz                    # source: mcp_server.py
      - notlari_listele              # source: mcp_server.py
