# langgraph_system/intents.yaml
# ==========================================================================
# SINGLE SOURCE OF TRUTH for all intents and their associated tools.
#
# HOW TO ADD A NEW MCP:
#   1. Start your new MCP server.
#   2. Find the tool names it exposes.
#   3. Add those tool names under the relevant intent's 'tools' list below.
#   4. That's it. No Python code changes needed.
#
# HOW TO ADD A NEW INTENT:
#   1. Add a new top-level entry under 'intents'.
#   2. Fill in description, examples, and tools.
#   3. The system will automatically pick it up on next run.
# ==========================================================================

intents:

  analyze:
    description: "Performansı göster, rapor ver, KPI sorgula, satış/reklam analizi yap"
    examples:
      - "roas nedir"
      - "ZAYNABED160X200 performans raporunu göster"
      - "geçen hafta satışlar nasıldı"
      - "XPUFFY4040KAREPUF kampanya metrikleri nelerdir"
    tools:
      - query                        # source: postgres mcp (analytics)
      - get_strategy_rules           # source: mcp_server.py (rules)

  info_only:
    description: "Ürün listesi, maliyet bilgisi, genel sistem soruları"
    examples:
      - "hangi ürünler var"
      - "ürün listesini göster"
      - "XPUFFY6060KAREPUF maliyeti nedir"
    tools:
      - query                        # source: postgres mcp

