tables:
  product_report:
    description: |
      This table contains advertising and sales performance data for products.
      It is a time-series report table, meaning the same product can appear in
      multiple rows across different dates.

      IMPORTANT ARCHITECTURE NOTE: The system collects multiple "snapshots" (cumulative records) 
      throughout the same day. This means for any given (date, product) pair, there will be 
      multiple rows representing periodic updates. 

      DOUBLE AGGREGATION PATTERN (FOR TOTALS): To calculate accurate totals (e.g., total spend over a week), the model must:
      1. Get the final snapshot for EACH day by using MAX(column) grouped by (sorgu_tarihi, urun_kodu).
      2. Perform the final SUM() on these daily maximums.
      Correct SQL Pattern: SELECT SUM(daily_max) FROM (SELECT MAX(harcanan_butce) as daily_max FROM product_report WHERE ... GROUP BY sorgu_tarihi, urun_kodu) as t

    columns:
      - "id: database row id. The highest id represents the newest record."
      - "sorgu_tarihi: date when the data was collected (YYYY-MM-DD). Türkçe: tarih, gün."
      - "sorgu_saati: time when the query was executed. Türkçe: saat."
      - "urun_kodu: product code (example: XPUFFY4040KAREPUF). Türkçe: ürün kodu, model."
      - "harcanan_butce: advertising budget spent. Türkçe: harcama, harcanan, maliyet, bütçe harcaması."
      - "gosterim_sayisi: number of ad impressions. Türkçe: gösterim."
      - "tiklanma_sayisi: number of ad clicks. Türkçe: tıklama."
      - "reklam_cirosu: revenue generated from ads. O ürüne tıklayan birinin yaptığı HERHANGİ BİR satışı gösterir. Reklam performansını ölçer."
      - "harcama_getirisi: ROAS value. Türkçe: ROAS, getiri, harcama getirisi. Note: For aggregate data, calculate manually."
      - "gerceklesen_tbm: actual cost per click. Türkçe: TBM, tıklama başı maliyet."
      - "tbm_teklif: manually given CPC bid. Türkçe: teklif, TBM teklifi."
      - "onerilen_tbm: marketplace recommended CPC bid. Türkçe: önerilen TBM. CRITICAL: Bu sütun ham METİNDİR (string). Matematiksel işlem veya CAST YAPILAMAZ. Örnek format: 'Önerilen TBM: 8.61 ₺ (En iyi 9.77 ₺)'"
      - "satis_adet: number of units sold. Türkçe: satış adedi, kaç adet sattı."
      - "net_satis: net revenue from ONLY this product. O ürünün kendi satış geliri (adet * fiyat)."
      - "created_at: record creation timestamp."
      - "gunluk_butce: daily advertising budget limit. Türkçe: günlük bütçe. 0 ise kampanya KAPALIDIR."
OUTPUT FORMAT RULE: |
  NEVER return raw JSON arrays to the user.
  Always convert DB results into readable Turkish sentences.
  Example — DB returns: [{"urun_kodu": "XPET..."}]
  Response must be like: "Pet ürünleriniz şunlardır: XPET4545KEDIYUVA, XPETMERD4DENYE..."

sql_rules:

  - |
    The table product_report is a time-series report table.
    The same product may appear multiple times across different dates.

  - |
    DOUBLE AGGREGATION RULE (CRITICAL — STRICT):

    This table stores CUMULATIVE SNAPSHOTS multiple times per day.
    A product with 100 TL daily spend may have 5 rows that day:
    20 TL, 45 TL, 67 TL, 89 TL, 100 TL — all for the same day.
    Direct SUM() would return 321 TL instead of 100 TL. THIS IS WRONG.

    FORBIDDEN PATTERNS — NEVER USE THESE:
    ❌ SELECT SUM(harcanan_butce) FROM product_report WHERE urun_kodu = '...'
    ❌ SELECT SUM(gosterim_sayisi) FROM product_report WHERE urun_kodu = '...'
    ❌ SELECT SUM(tiklanma_sayisi) FROM product_report WHERE urun_kodu = '...'
    ❌ SELECT SUM(reklam_cirosu) FROM product_report WHERE urun_kodu = '...'
    ❌ SELECT MAX(harcama_getirisi) FROM product_report (across all history — picks random best day)
    ❌ SELECT AVG(gerceklesen_tbm) FROM product_report (without daily grouping)

    MANDATORY PATTERN for ALL historical totals:
    Step 1 — Get daily final value: MAX(column) GROUP BY sorgu_tarihi, urun_kodu
    Step 2 — Sum the daily finals: SUM(daily_val)

    CORRECT TEMPLATE for "temel metrikler" / product overview queries:
    SELECT
      urun_kodu,
      SUM(daily_spend)        AS toplam_harcama,
      SUM(daily_impressions)  AS toplam_gosterim,
      SUM(daily_clicks)       AS toplam_tiklanma,
      SUM(daily_revenue)      AS toplam_ciro,
      SUM(daily_sales)        AS toplam_satis,
      SUM(daily_revenue) / NULLIF(SUM(daily_spend), 0) AS gercek_roas
    FROM (
      SELECT
        urun_kodu,
        sorgu_tarihi,
        MAX(harcanan_butce)   AS daily_spend,
        MAX(gosterim_sayisi)  AS daily_impressions,
        MAX(tiklanma_sayisi)  AS daily_clicks,
        MAX(reklam_cirosu)    AS daily_revenue,
        MAX(satis_adet)       AS daily_sales
      FROM product_report
      WHERE urun_kodu ILIKE '%<product>%'
      GROUP BY urun_kodu, sorgu_tarihi
    ) AS daily_finals
    GROUP BY urun_kodu;

    ROAS FOR OVERVIEW QUERIES:
    NEVER use MAX(harcama_getirisi) for historical overview.
    It picks the single best snapshot across all history — meaningless as a summary.
    Instead calculate: SUM(daily_revenue) / NULLIF(SUM(daily_spend), 0)
    This gives the true blended ROAS across all history.

    TODAY vs YESTERDAY COMPARISON:
    SELECT sorgu_tarihi, MAX(reklam_cirosu)/NULLIF(MAX(harcanan_butce), 0) as daily_roas
    FROM product_report
    WHERE urun_kodu ILIKE '%<product>%'
      AND sorgu_tarihi >= CURRENT_DATE - INTERVAL '2 days'
    GROUP BY sorgu_tarihi, urun_kodu
    ORDER BY sorgu_tarihi DESC;

    TRIGGER QUERIES — apply double aggregation pattern whenever user asks:
    - "temel metrikler", "ürünü incele", "özet", "genel durum"
    - "toplam harcama", "toplam satış", "toplam gösterim", "toplam ciro"
    - Any aggregate across more than one day for a specific product

  - |
    ROAS RULES:
    1. If the user asks for "Current ROAS" or "ROAS of a specific product", simply use the 'harcama_getirisi' column.
    2. Example: SELECT harcama_getirisi FROM product_report WHERE urun_kodu = '...' ORDER BY id DESC LIMIT 1
    3. Use the aggregation formula [SUM(reklam_cirosu) / NULLIF(SUM(harcanan_butce), 0)] ONLY if the user specifically asks for "Average ROAS over time" or "Total ROAS for all products".

  - |
    If the user asks for the latest or most recent value,
    use ORDER BY id DESC LIMIT 1.

  - |
    If the user asks for the highest or lowest value of a metric,
    use ORDER BY <column> DESC or ASC with LIMIT 1.

  - |
    When searching for a specific product mentioned by the user,
    use case-insensitive matching on the urun_kodu column using ILIKE.

  - |
    Do not search the entire user sentence with LIKE.
    Extract meaningful keywords (for example: puf, yatak, sandalye)
    and use them in separate ILIKE conditions.

  - |
    Example product search patterns:

    WHERE urun_kodu ILIKE '%PUF%'

    or

    WHERE urun_kodu ILIKE '%PUF%' AND urun_kodu ILIKE '%KARE%'

  - |
    If the user asks for a list of products (for example:
    "what products do we sell" or "product list"),
    return DISTINCT values from the urun_kodu column.

  - |
    For listing queries, add LIMIT 30 to prevent returning too many rows.

  - |
    Do not use LIMIT for aggregation queries.

  - |
    If the user asks about time periods or dates,
    use the sorgu_tarihi column.

  - |
    TIMEZONE & DATE OFFSET RULE:
    Data at 12:00 TR time is logged with 'sorgu_tarihi' at 21:00 UTC of the PREVIOUS day.
    - If user says "Today", use: sorgu_tarihi = (SELECT MAX(sorgu_tarihi) FROM product_report)
    - Or use: sorgu_tarihi = CURRENT_DATE - INTERVAL '1 day'
    As CURRENT_DATE usually has zero records.

  - |
    GENERAL SQL FORMATTING RULES:
    1. DO NOT use placeholders like '?' in SQL. Embed values directly (e.g., WHERE urun_kodu = '...').
    2. RETURN ONLY the SQL query in the first step. No explanations.
    3. Use ILIKE for product code matching and extract keywords for search.

  - |
    CAMPAIGN STATUS DIAGNOSIS:
    - gunluk_butce = 0 -> Campaign is PAUSED (KAPALI).
    - harcanan_butce = 0 AND gunluk_butce > 0 -> Campaign is ACTIVE but NOT SPENDING (TIKANMIŞ).
    - harcanan_butce > 0 AND satis_adet = 0 -> Campaign is SPENDING but NO SALES (PERFORMANS DÜŞÜK).
      When diagnosing campaign status (KAPALI, TIKANMIŞ, PERFORMANS DÜŞÜK),
    ALWAYS filter to the most recent date only:
    WHERE sorgu_tarihi = (SELECT MAX(sorgu_tarihi) FROM product_report)
    Querying all historical rows will cause false positives — a product that
    spent nothing on one old day will incorrectly appear as TIKANMIŞ.

  - |
    If the SQL query returns no rows, respond that no data
    was found for the given criteria. Ensure responses are in TURKISH.

  - |
    PRODUCT SCOPE RULE (CRITICAL — STRICT ENFORCEMENT):
    If the conversation context is focused on a specific product (e.g., user previously
    asked about ZAYNABED160X200), ALL subsequent queries MUST include a
    WHERE urun_kodu ILIKE '%<product_code>%' filter unless the user EXPLICITLY
    asks for a portfolio-wide comparison.
    
    - NEVER silently switch to a different product from earlier in the conversation.
    - Even if a previous query returned NULL or no data for the product, that product
      remains in scope. Do NOT default back to a different product.
    - If the previous query returned no data AND the user asks a follow-up, respond:
      "Önceki sorguda bu ürün için veri bulunamıştı. Hangi ürün hakkında devam edelim?"
    - Never run aggregate queries without a urun_kodu filter when a product is in scope.
    - If it is ambiguous which product the user is referring to, ASK before querying.

  - |
    ROAS RANKING RULE:
    When listing top/bottom N products by ROAS, always GROUP BY urun_kodu first
    to avoid duplicate products in results.
    Correct pattern:
    SELECT urun_kodu, MAX(harcama_getirisi) as max_roas
    FROM product_report
    GROUP BY urun_kodu
    ORDER BY max_roas DESC
    LIMIT <N>

  - |
    EMPTY RESULT HANDLING:
    If the DB returns [] (empty array) or all-null values for a specific product query,
    respond ONLY with: "Bu ürün kodu için veritabanında kayıt bulunamadı."
    Do NOT speculate about why data might be missing (e.g., "campaign not started",
    "data not yet integrated"). Ask the user to verify the product code.

  - |
    ONERILEN_TBM RULE (CRITICAL — NO ARITHMETIC):
    The 'onerilen_tbm' column is a raw TEXT field with a human-readable format.
    Example value: "Önerilen TBM: 8.61 ₺ (En iyi 9.77 ₺)"
    
    NEVER use this column in:
    - Arithmetic operations (subtraction, addition, etc.)
    - CAST() or ::NUMERIC conversions directly
    - Any SQL expression that expects a numeric type
    
    If the user asks to compare tbm_teklif with onerilen_tbm, extract the numeric
    value using REGEXP first:
    
    REGEXP_REPLACE(onerilen_tbm, '[^0-9.]', '', 'g')::NUMERIC
    
    Example safe pattern:
    SELECT
      tbm_teklif,
      REGEXP_REPLACE(onerilen_tbm, '[^0-9.]', '', 'g')::NUMERIC AS onerilen_tbm_numeric,
      tbm_teklif - REGEXP_REPLACE(onerilen_tbm, '[^0-9.]', '', 'g')::NUMERIC AS fark
    FROM product_report
    WHERE urun_kodu ILIKE '%<product>%'
    ORDER BY id DESC LIMIT 1;

  - |
    SQL ERROR HANDLING RULE (CRITICAL — HALLUCINATION PREVENTION):
    If the database returns a SQL error (not an empty result [], but an actual error message),
    you MUST follow these steps:
    
    1. Inform the user in plain Turkish what type of error occurred.
       Example: "SQL sorgusunda bir hata oluştu: [hata türü]"
    2. NEVER generate, estimate, invent, or recall any numeric values from memory
       as if the query had succeeded.
    3. Do NOT answer the original question as if data was returned.
    4. Suggest a corrected query approach if possible.
    
    VIOLATION EXAMPLE (FORBIDDEN):
    DB returns SQL error → Model says "TBM teklifi 2.30, önerilen 2.13, fark 0.17"
    This is fabrication. There is no data source for these numbers. This is a critical failure.

  - |
    BUDGET DISTRIBUTION RULE:
    If the user asks how to allocate a budget across products
    (e.g., "500 TL dağıtayım", "bu parayı hangi ürünlere versem"),
    use this pattern:
    
    1. Get the latest ROAS for ALL active products on the most recent date:
       SELECT urun_kodu, MAX(harcama_getirisi) as roas, MAX(gunluk_butce) as gunluk_butce
       FROM product_report
       WHERE sorgu_tarihi = (SELECT MAX(sorgu_tarihi) FROM product_report)
       GROUP BY urun_kodu
       HAVING MAX(harcama_getirisi) > 0 AND MAX(gunluk_butce) > 0
       ORDER BY roas DESC
       LIMIT 5;
    
    2. From the results, suggest proportional allocation based on ROAS weights.
       Example: If Product A has ROAS 4.0 and Product B has ROAS 2.0,
       allocate 67% to A and 33% to B.
    
    NEVER return a single product or NULL result for a budget distribution question.
    If no products have ROAS > 0, report this clearly and suggest investigating
    campaign performance before allocating budget.